<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ultimate Visual Diff & Stats</title>
    <style>
      :root {
        --bg: #ffffff;
        --surface: #f6f8fa;
        --border: #d0d7de;
        --text: #24292f;
        --add-bg: #dafbe1;
        --rem-bg: #ffebe9;
        --add-line: #2da44e;
        --rem-line: #cf222e;
        --accent: #0969da;
      }
      [data-theme="dark"] {
        --bg: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --add-bg: #1a7f3744;
        --rem-bg: #da363344;
      }

      body {
        font-family: -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 20px;
        transition: 0.2s;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        align-items: center;
        flex-wrap: wrap;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .header-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        font-weight: bold;
        color: #57606a;
      }
      .stats-badge {
        background: var(--surface);
        padding: 2px 6px;
        border-radius: 4px;
        border: 1px solid var(--border);
        font-variant-numeric: tabular-nums;
      }

      textarea {
        height: 200px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        font-family: monospace;
        font-size: 13px;
        resize: vertical;
      }

      /* Side-by-Side Comparison */
      .diff-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg);
        overflow: hidden;
        margin-top: 20px;
      }
      .diff-pane {
        overflow-x: auto;
        font-family: monospace;
        font-size: 13px;
        line-height: 1.5;
        min-height: 300px;
      }
      .diff-pane:first-child {
        border-right: 1px solid var(--border);
      }
      .diff-line {
        display: flex;
        white-space: pre;
        min-height: 1.5em;
        padding: 0 5px;
      }

      .line-removed {
        background-color: var(--rem-bg);
        border-left: 4px solid var(--rem-line);
      }
      .line-added {
        background-color: var(--add-bg);
        border-left: 4px solid var(--add-line);
      }
      .ln {
        color: #999;
        width: 35px;
        user-select: none;
        border-right: 1px solid var(--border);
        margin-right: 10px;
        text-align: right;
        padding-right: 5px;
        background: var(--surface);
      }

      button {
        padding: 6px 12px;
        cursor: pointer;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 13px;
      }
      button:hover {
        background: var(--accent);
        color: white;
      }
      .net-stats {
        margin-left: auto;
        font-weight: bold;
        font-size: 14px;
      }
    </style>

    <script>
      navigator.serviceWorker.register("service-worker.js");
    </script>
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div class="toolbar">
      <h3 style="margin: 0">Visual Diff Pro</h3>
      <button onclick="swapTexts()">⇄ Swap</button>
      <button onclick="formatJSON()">{ } Format JSON</button>
      <button onclick="toggleTheme()">🌓 Theme</button>
      <div id="diffNet" class="net-stats"></div>
    </div>

    <div class="grid">
      <div class="panel">
        <div class="header-row">
          <span>ORIGINAL</span>
          <span class="stats-badge" id="stats1">Words: 0 | Chars: 0</span>
        </div>
        <textarea id="text1" placeholder="Paste original text..."></textarea>
      </div>
      <div class="panel">
        <div class="header-row">
          <span>MODIFIED</span>
          <span class="stats-badge" id="stats2">Words: 0 | Chars: 0</span>
        </div>
        <textarea id="text2" placeholder="Paste changes..."></textarea>
      </div>
    </div>

    <div class="diff-container">
      <div id="pane1" class="diff-pane"></div>
      <div id="pane2" class="diff-pane"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
    <script>
      const t1 = document.getElementById("text1");
      const t2 = document.getElementById("text2");
      const p1 = document.getElementById("pane1");
      const p2 = document.getElementById("pane2");

      function toggleTheme() {
        const doc = document.documentElement;
        doc.setAttribute(
          "data-theme",
          doc.getAttribute("data-theme") === "dark" ? "light" : "dark",
        );
      }

      function swapTexts() {
        const temp = t1.value;
        t1.value = t2.value;
        t2.value = temp;
        update();
      }

      function formatJSON() {
        [t1, t2].forEach((t) => {
          try {
            if (t.value.trim()) {
              const obj = JSON.parse(t.value);
              t.value = JSON.stringify(obj, null, 2);
            }
          } catch (e) {
            console.log("Not valid JSON in one of the boxes");
          }
        });
        update();
      }

      function getStats(str) {
        const words = str.trim() ? str.trim().split(/\s+/).length : 0;
        return `Words: ${words} | Chars: ${str.length}`;
      }

      function createLine(content, className, num) {
        const displayNum = num || "&nbsp;";
        return `<div class="diff-line ${className}"><span class="ln">${displayNum}</span><span>${content}</span></div>`;
      }

      function update() {
        // Update Individual Stats
        document.getElementById("stats1").innerText = getStats(t1.value);
        document.getElementById("stats2").innerText = getStats(t2.value);

        const diff = Diff.diffLines(t1.value, t2.value);
        let html1 = "",
          html2 = "";
        let n1 = 1,
          n2 = 1;
        let addedWords = 0,
          removedWords = 0;

        diff.forEach((part) => {
          const lines = part.value.split("\n");
          if (lines[lines.length - 1] === "") lines.pop();

          lines.forEach((line) => {
            const escaped = line
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
            const wordCount = line.trim() ? line.trim().split(/\s+/).length : 0;

            if (part.added) {
              html2 += createLine(escaped, "line-added", n2++);
              html1 += createLine("", "", "");
              addedWords += wordCount;
            } else if (part.removed) {
              html1 += createLine(escaped, "line-removed", n1++);
              html2 += createLine("", "", "");
              removedWords += wordCount;
            } else {
              html1 += createLine(escaped, "", n1++);
              html2 += createLine(escaped, "", n2++);
            }
          });
        });

        p1.innerHTML = html1;
        p2.innerHTML = html2;
        document.getElementById("diffNet").innerHTML =
          `<span style="color: #2da44e">+${addedWords}</span> / <span style="color: #cf222e">-${removedWords}</span> net words`;
      }

      t1.oninput = update;
      t2.oninput = update;
    </script>
  </body>
</html>
